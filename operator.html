<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Operador — Stream Director</title>
  <link rel="stylesheet" href="style.css"/>
  <script src="https://cdn.jsdelivr.net/npm/livekit-client/dist/livekit-client.umd.min.js"></script>
</head>
<body>

<header class="topbar">
  <div class="logo">
    <div class="logo-icon">🎛️</div>
    <h1>Stream <span>Director</span> — <span style="color:#2979ff">Operador</span></h1>
  </div>
  <div class="flex items-center gap-16">
    <div id="onAirBadge" class="on-air-badge hidden">
      <span class="dot"></span> ON AIR
    </div>
    <div class="flex items-center gap-8">
      <span class="status-dot" id="connDot"></span>
      <span class="text-xs text-muted" id="connLabel">Desconectado</span>
    </div>
    <div class="signal-bars" id="signalBars" style="opacity:0.3">
      <span></span><span></span><span></span><span></span><span></span>
    </div>
  </div>
</header>

<div class="container">

  <!-- JOIN PANEL -->
  <div id="joinPanel" class="card" style="max-width:480px;margin:40px auto;">
    <div class="card-header">📡 Conectar como Operador</div>
    <div class="form-group">
      <label>ID de la Sala</label>
      <input type="text" id="roomId" placeholder="Ej: sala-principal" />
    </div>
    <div class="form-group">
      <label>Tu nombre</label>
      <input type="text" id="identity" placeholder="Ej: operador-1" value="operador" />
    </div>
    <div id="joinAlert" class="hidden"></div>
    <button class="btn btn-primary w-full btn-lg" onclick="joinRoom()">
      🔴 Conectar al Control
    </button>
    <p class="text-xs text-muted text-center mt-16">
      Necesitas el mismo ID de sala que los streamers
    </p>
  </div>

  <!-- CONTROL PANEL -->
  <div id="controlPanel" class="hidden">

    <div class="flex items-center justify-between" style="margin-bottom:20px;">
      <div>
        <h2 style="font-size:20px;font-weight:700;letter-spacing:1px;">SALA: <span id="roomLabel" style="color:var(--accent-red)"></span></h2>
        <p class="text-xs text-muted mt-8">Selecciona quién sale al aire</p>
      </div>
      <div class="flex gap-12 items-center">
        <div id="selectedInfo" class="hidden">
          <div class="flex items-center gap-8">
            <span class="status-dot live"></span>
            <span class="text-sm">En aire: <strong id="selectedName" style="color:var(--accent-red)"></strong></span>
          </div>
        </div>
        <button class="btn btn-ghost" onclick="goHome()">← Salir</button>
      </div>
    </div>

    <!-- NO STREAMERS -->
    <div id="noStreamers" class="card text-center" style="padding:60px;">
      <div style="font-size:48px;margin-bottom:16px;">📭</div>
      <p style="font-size:16px;font-weight:600;margin-bottom:8px;">Sin streamers conectados</p>
      <p class="text-muted text-sm">Los streamers aparecerán aquí cuando se conecten a la sala</p>
      <div style="margin-top:24px;" class="flex items-center gap-8" style="justify-content:center;">
        <span class="status-dot waiting"></span>
        <span class="text-xs text-muted">Esperando participantes...</span>
      </div>
    </div>

    <!-- STREAMERS GRID -->
    <div id="streamersGrid" class="streamer-grid hidden"></div>

    <!-- OPERATOR OWN PREVIEW (hidden video) -->
    <div id="localVideoContainer" class="hidden"></div>

  </div>

</div>

<script>
  const BACKEND = 'https://stream-director-backend-v2-production.up.railway.app';
  const LIVEKIT_URL = 'wss://stream-director-13gpu9p5.livekit.cloud';

  let room = null;
  let currentRoomId = '';
  let selectedParticipant = null;
  let pollInterval = null;

  window.addEventListener('DOMContentLoaded', () => {
    const saved = localStorage.getItem('sd_room_id');
    if (saved) document.getElementById('roomId').value = saved;
  });

  async function joinRoom() {
    const roomId = document.getElementById('roomId').value.trim();
    const identity = document.getElementById('identity').value.trim() || 'operador';
    const alertEl = document.getElementById('joinAlert');
    alertEl.className = 'hidden';

    if (!roomId) {
      alertEl.className = 'alert alert-error';
      alertEl.textContent = 'Ingresa el ID de la sala';
      return;
    }

    try {
      const res = await fetch(BACKEND + '/api/token/operator', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ roomId, identity })
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Error al obtener token');

      currentRoomId = roomId;
      localStorage.setItem('sd_room_id', roomId);

      room = new LivekitClient.Room();
      setupRoomEvents();

      await room.connect(LIVEKIT_URL, data.token);
      setConnected(true);

      document.getElementById('joinPanel').classList.add('hidden');
      document.getElementById('controlPanel').classList.remove('hidden');
      document.getElementById('roomLabel').textContent = roomId;

      // Start polling for selected participant
      startPolling();
    } catch(e) {
      alertEl.className = 'alert alert-error';
      alertEl.textContent = 'Error: ' + e.message;
    }
  }

  function setupRoomEvents() {
    room.on(LivekitClient.RoomEvent.ParticipantConnected, (p) => {
      console.log('Connected:', p.identity);
      updateStreamers();
    });
    room.on(LivekitClient.RoomEvent.ParticipantDisconnected, (p) => {
      console.log('Disconnected:', p.identity);
      updateStreamers();
    });
    room.on(LivekitClient.RoomEvent.TrackSubscribed, (track, pub, participant) => {
      updateStreamers();
    });
    room.on(LivekitClient.RoomEvent.TrackUnsubscribed, () => {
      updateStreamers();
    });
    room.on(LivekitClient.RoomEvent.Disconnected, () => {
      setConnected(false);
    });
  }

  function updateStreamers() {
    const grid = document.getElementById('streamersGrid');
    const noStreamers = document.getElementById('noStreamers');

    const participants = Array.from(room.remoteParticipants.values())
      .filter(p => !p.identity.startsWith('operador') && !p.identity.startsWith('pantalla'));

    if (participants.length === 0) {
      grid.classList.add('hidden');
      noStreamers.classList.remove('hidden');
      return;
    }

    noStreamers.classList.add('hidden');
    grid.classList.remove('hidden');
    grid.innerHTML = '';

    participants.forEach(participant => {
      const card = createStreamerCard(participant);
      grid.appendChild(card);
    });
  }

  function createStreamerCard(participant) {
    const isSelected = selectedParticipant === participant.identity;
    const card = document.createElement('div');
    card.className = 'streamer-card' + (isSelected ? ' selected' : '');
    card.dataset.identity = participant.identity;

    if (isSelected) {
      const badge = document.createElement('div');
      badge.className = 'selected-badge';
      badge.textContent = '● EN AIRE';
      card.appendChild(badge);
    }

    const thumb = document.createElement('div');
    thumb.className = 'thumb';

    let hasVideo = false;
    participant.videoTrackPublications.forEach(pub => {
      if (pub.track && pub.isSubscribed) {
        const video = pub.track.attach();
        video.muted = true;
        thumb.appendChild(video);
        hasVideo = true;
      }
    });

    if (!hasVideo) {
      const noVid = document.createElement('div');
      noVid.className = 'no-video';
      noVid.innerHTML = participant.identity.includes('screen') ? '🖥️' : '🎤';
      thumb.appendChild(noVid);
    }

    card.appendChild(thumb);

    const info = document.createElement('div');
    info.className = 'info';

    const name = document.createElement('div');
    name.className = 'name';
    name.textContent = participant.identity;
    info.appendChild(name);

    if (isSelected) {
      const liveTag = document.createElement('span');
      liveTag.style.cssText = 'font-size:10px;font-weight:800;color:var(--accent-red);letter-spacing:2px;text-transform:uppercase;';
      liveTag.textContent = '● LIVE';
      info.appendChild(liveTag);
    } else {
      const btn = document.createElement('button');
      btn.className = 'btn btn-primary select-btn';
      btn.textContent = 'AL AIRE';
      btn.onclick = () => selectStreamer(participant.identity);
      info.appendChild(btn);
    }

    card.appendChild(info);
    return card;
  }

  async function selectStreamer(identity) {
    try {
      const res = await fetch(BACKEND + '/api/rooms/' + currentRoomId + '/select', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ participantId: identity })
      });
      if (!res.ok) throw new Error('Error al seleccionar');
      selectedParticipant = identity;
      updateStreamers();
      updateSelectedInfo();
      document.getElementById('onAirBadge').classList.remove('hidden');
    } catch(e) {
      console.error(e);
    }
  }

  function updateSelectedInfo() {
    const el = document.getElementById('selectedInfo');
    if (selectedParticipant) {
      document.getElementById('selectedName').textContent = selectedParticipant;
      el.classList.remove('hidden');
    } else {
      el.classList.add('hidden');
    }
  }

  function startPolling() {
    pollInterval = setInterval(async () => {
      try {
        const res = await fetch(BACKEND + '/api/rooms/' + currentRoomId + '/selected');
        const data = await res.json();
        const prev = selectedParticipant;
        selectedParticipant = data.selected;
        if (prev !== selectedParticipant) {
          updateStreamers();
          updateSelectedInfo();
          if (selectedParticipant) {
            document.getElementById('onAirBadge').classList.remove('hidden');
          } else {
            document.getElementById('onAirBadge').classList.add('hidden');
          }
        }
      } catch(e) {}
    }, 2000);
  }

  function setConnected(val) {
    const dot = document.getElementById('connDot');
    const label = document.getElementById('connLabel');
    const bars = document.getElementById('signalBars');
    if (val) {
      dot.className = 'status-dot online';
      label.textContent = 'Conectado';
      bars.style.opacity = '1';
    } else {
      dot.className = 'status-dot';
      label.textContent = 'Desconectado';
      bars.style.opacity = '0.3';
    }
  }

  function goHome() {
    if (room) room.disconnect();
    if (pollInterval) clearInterval(pollInterval);
    window.location.href = 'index.html';
  }

  window.addEventListener('beforeunload', () => {
    if (room) room.disconnect();
    if (pollInterval) clearInterval(pollInterval);
  });
</script>

</body>
</html>
